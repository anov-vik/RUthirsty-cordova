<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <title>喝水打卡</title>
    </head>
    <body>
        <div class="app">
            <div class="header">
                <h1>💧 喝水打卡</h1>
                <div class="today-stats">
                    <p>今日已喝水: <span id="todayCount">0</span> 次</p>
                </div>
                <div class="reminder-countdown">
                    <p>⏰ 下次提醒: <span id="countdown">--:--:--</span></p>
                </div>
            </div>

            <div class="check-in-section">
                <button id="checkInBtn" class="check-in-btn">
                    <span class="btn-icon">💧</span>
                    <span class="btn-text">打卡喝水</span>
                </button>
            </div>

            <div class="records-section">
                <div class="records-header">
                    <h2>喝水记录</h2>
                    <button id="clearBtn" class="clear-btn">清空记录</button>
                </div>
                <div id="recordsList" class="records-list">
                    <p class="empty-message">暂无记录，点击上方按钮开始打卡吧！</p>
                </div>
            </div>
        </div>
        <script src="cordova.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
