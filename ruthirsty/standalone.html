<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喝水打卡</title>
    <style>
        * {
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            box-sizing: border-box;
        }

        html {
            overscroll-behavior: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: system-ui, -apple-system, -apple-system-font, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .app {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 20px 0 10px 0;
        }

        .today-stats {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
        }

        .today-stats p {
            font-size: 18px;
            font-weight: 500;
            margin: 0;
            color: white;
        }

        #todayCount {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .check-in-section {
            text-align: center;
            margin: 40px 0;
        }

        .check-in-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            margin: 0 auto;
        }

        .check-in-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-icon {
            font-size: 48px;
            margin-bottom: 5px;
        }

        .btn-text {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .records-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .records-section h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 20px 0;
            color: #333;
        }

        .records-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }

        .record-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .record-time {
            font-size: 16px;
            font-weight: 500;
            color: white;
        }

        .record-icon {
            font-size: 24px;
        }

        .success-animation {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>💧 喝水打卡</h1>
            <div class="today-stats">
                <p>今日已喝水: <span id="todayCount">0</span> 次</p>
            </div>
        </div>

        <div class="check-in-section">
            <button id="checkInBtn" class="check-in-btn">
                <span class="btn-icon">💧</span>
                <span class="btn-text">打卡喝水</span>
            </button>
        </div>

        <div class="records-section">
            <h2>喝水记录</h2>
            <div id="recordsList" class="records-list">
                <p class="empty-message">暂无记录，点击上方按钮开始打卡吧！</p>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'waterCheckInRecords';
        let records = [];

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('喝水打卡应用已启动');
            loadRecords();
            updateUI();

            const checkInBtn = document.getElementById('checkInBtn');
            checkInBtn.addEventListener('click', handleCheckIn);
        });

        function loadRecords() {
            const storedRecords = localStorage.getItem(STORAGE_KEY);
            if (storedRecords) {
                records = JSON.parse(storedRecords);
            }
        }

        function saveRecords() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        function handleCheckIn() {
            const now = new Date();
            const record = {
                id: Date.now(),
                timestamp: now.toISOString(),
                date: now.toLocaleDateString('zh-CN'),
                time: now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            };

            records.unshift(record);
            saveRecords();

            const btn = document.getElementById('checkInBtn');
            btn.classList.add('success-animation');
            setTimeout(() => {
                btn.classList.remove('success-animation');
            }, 500);

            updateUI();
        }

        function getTodayCount() {
            const today = new Date().toLocaleDateString('zh-CN');
            return records.filter(record => record.date === today).length;
        }

        function updateUI() {
            const todayCount = getTodayCount();
            document.getElementById('todayCount').textContent = todayCount;

            const recordsList = document.getElementById('recordsList');

            if (records.length === 0) {
                recordsList.innerHTML = '<p class="empty-message">暂无记录，点击上方按钮开始打卡吧！</p>';
                return;
            }

            recordsList.innerHTML = records.map(record => `
                <div class="record-item">
                    <div class="record-time">
                        ${record.date} ${record.time}
                    </div>
                    <div class="record-icon">💧</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
