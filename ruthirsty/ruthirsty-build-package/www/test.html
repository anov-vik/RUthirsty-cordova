<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喝水打卡 - 浏览器测试</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>💧 喝水打卡</h1>
            <div class="today-stats">
                <p>今日已喝水: <span id="todayCount">0</span> 次</p>
            </div>
        </div>

        <div class="check-in-section">
            <button id="checkInBtn" class="check-in-btn">
                <span class="btn-icon">💧</span>
                <span class="btn-text">打卡喝水</span>
            </button>
        </div>

        <div class="records-section">
            <h2>喝水记录</h2>
            <div id="recordsList" class="records-list">
                <p class="empty-message">暂无记录，点击上方按钮开始打卡吧！</p>
            </div>
        </div>
    </div>

    <script>
        // 浏览器测试模式 - 模拟 deviceready 事件
        document.addEventListener('DOMContentLoaded', function() {
            console.log('浏览器测试模式启动');
            // 触发模拟的 deviceready
            const event = new Event('deviceready');
            document.dispatchEvent(event);
        });

        // 模拟 cordova 对象
        if (typeof cordova === 'undefined') {
            window.cordova = {
                platformId: 'browser',
                version: 'test-mode'
            };
        }
    </script>
    <script src="js/index.js"></script>
</body>
</html>
