name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: |
          npm install -g cordova
          cordova -v

      - name: Install dependencies
        run: |
          cd ruthirsty
          npm install

      - name: Add Android platform
        run: |
          cd ruthirsty
          cordova platform add android

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: |
          cd ruthirsty
          cordova build android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ruthirsty-debug-apk
          path: ruthirsty/platforms/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK
        run: |
          cd ruthirsty
          cordova build android --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ruthirsty-release-apk
          path: ruthirsty/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Get APK info
        run: |
          cd ruthirsty
          APK_PATH="platforms/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ Debug APK size: $(du -h $APK_PATH | cut -f1)"
          fi
          APK_PATH="platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ Release APK size: $(du -h $APK_PATH | cut -f1)"
          fi
